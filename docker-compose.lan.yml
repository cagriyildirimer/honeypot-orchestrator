version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: honeypot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot_password
      POSTGRES_DB: honeypot
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  honeypot-web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeypot-web-lan
    depends_on:
      - postgres
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      HONEYPOT_HOST: "0.0.0.0"
      HONEYPOT_PROFILE: "windows_server"
      HONEYPOT_WEB_ENABLED: "true"
      HONEYPOT_DECOYS_ENABLED: "false"
      HONEYPOT_WEB_HOST: "0.0.0.0"
      HONEYPOT_WEB_PORT: "8000"
      HONEYPOT_LOG_PATH: "/app/logs/events.jsonl"
      HONEYPOT_DB_URL: "postgresql://honeypot:honeypot_password@postgres:5432/honeypot"
      HONEYPOT_AUTH_USERNAME: "${HONEYPOT_AUTH_USERNAME:-admin}"
      HONEYPOT_AUTH_PASSWORD: "${HONEYPOT_AUTH_PASSWORD:-admin123}"
      HONEYPOT_LAN_IP: "${HONEYPOT_LAN_IP:-}"
    volumes:
      - honeypot_logs:/app/logs
      # Bind mount config.yaml from project root
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped

  honeypot-decoys:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeypot-decoys-lan
    depends_on:
      - postgres
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      HONEYPOT_HOST: "0.0.0.0"
      HONEYPOT_PROFILE: "windows_server"
      HONEYPOT_WEB_ENABLED: "false"
      HONEYPOT_DECOYS_ENABLED: "true"
      HONEYPOT_LOG_PATH: "/app/logs/events.jsonl"
      HONEYPOT_DB_URL: "postgresql://honeypot:honeypot_password@postgres:5432/honeypot"
      HONEYPOT_LAN_IP: "${HONEYPOT_LAN_IP:-}"
      # Standard decoy port overrides for LAN mode
      HONEYPOT_SERVICE_HTTP_WINDOWS_PORT: 80
      HONEYPOT_SERVICE_HTTP_LINUX_PORT: 80
      HONEYPOT_SERVICE_SSH_WINDOWS_PORT: 22
      HONEYPOT_SERVICE_SSH_LINUX_PORT: 22
      HONEYPOT_SERVICE_FTP_LINUX_PORT: 21
      HONEYPOT_SERVICE_TELNET_LINUX_PORT: 23
      HONEYPOT_SERVICE_DNS_WINDOWS_PORT: 53
      HONEYPOT_SERVICE_SMB_WINDOWS_PORT: 445
      HONEYPOT_SERVICE_NETBIOS_WINDOWS_PORT: 139
      HONEYPOT_SERVICE_NBTNNS_WINDOWS_PORT: 137
      HONEYPOT_SERVICE_LLMNR_WINDOWS_PORT: 5355
      HONEYPOT_SERVICE_RPC_WINDOWS_PORT: 135
      HONEYPOT_SERVICE_LDAP_WINDOWS_PORT: 389
      HONEYPOT_SERVICE_LDAPS_WINDOWS_PORT: 636
      HONEYPOT_SERVICE_MSSQL_WINDOWS_PORT: 1433
      HONEYPOT_SERVICE_RDP_WINDOWS_PORT: 3389
    volumes:
      - honeypot_logs:/app/logs
      # Bind mount config.yaml from project root
      - ./config.yaml:/app/config.yaml
    networks:
      a_macvlan:
        ipv4_address: "${HONEYPOT_LAN_IP:?Set HONEYPOT_LAN_IP to the reserved LAN IP for the container}"
      default:
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: honeypot-frontend-lan
    ports:
      - "80:80"
    depends_on:
      - honeypot-web
    restart: unless-stopped

volumes:
  pgdata:
  honeypot_logs:

networks:
  a_macvlan:
    external: true
    name: "${HONEYPOT_LAN_NETWORK:-honeypot_lan_net}"
