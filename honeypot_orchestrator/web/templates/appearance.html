<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Honeypot Director Appearance</title>
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem("honeypot-director-theme") === "dark" ? "dark" : "light";
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    </script>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="app-page">
    <div class="app-frame">
      <aside class="sidebar">
        <a class="brand" href="/dashboard" aria-label="Honeypot Director dashboard">
          <span class="brand-mark">HD</span>
          <span class="brand-text">Honeypot Director</span>
        </a>

        <nav class="nav-stack" aria-label="Primary navigation">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link" href="/logs">Logs</a>
          <div class="nav-group">
            <span class="nav-link nav-category active">Settings</span>
            <a class="nav-link nav-sub-link active" href="/settings/appearance">↳ Appearance</a>
            <a class="nav-link nav-sub-link" href="/settings/system">↳ System</a>
            <a class="nav-link nav-sub-link" href="/settings/users">↳ Users</a>
          </div>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Appearance</h1>
            <p class="page-subtitle">Theme controls for the web panel.</p>
          </div>
          <div class="topbar-actions">
            <div class="user-pill">
              <span>Signed in as</span>
              <strong id="sessionUser">-</strong>
            </div>
            <button id="logoutButton" type="button" class="button">Log out</button>
          </div>
        </header>

        <section class="panel">
          <div class="section-heading">
            <div>
              <h2>Theme</h2>
              <p>Switch between light and dark mode.</p>
            </div>
            <button type="button" class="button secondary" data-theme-toggle>Dark Mode</button>
          </div>
        </section>

        <div id="toast" class="toast" hidden></div>
      </main>
    </div>

    <script src="/static/common.js"></script>
    <script>
      document.querySelector("#logoutButton")?.addEventListener("click", logoutAndRedirect);
      ensureAuthenticated()
        .then((session) => {
          setText("#sessionUser", session.username || "-");
        })
        .catch(() => {
          window.location.replace("/login");
        });
    </script>
  </body>
</html>
