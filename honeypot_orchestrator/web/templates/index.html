<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Honeypot Orchestrator</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Honeypot Orchestrator</h1>
          <p>Lab dashboard for fake defensive services</p>
        </div>
        <button id="refreshButton" type="button">Refresh</button>
      </header>

      <section class="stats" aria-label="Statistics">
        <div>
          <span>Total recent events</span>
          <strong id="totalEvents">0</strong>
        </div>
        <div>
          <span>Login attempts</span>
          <strong id="loginAttempts">0</strong>
        </div>
        <div>
          <span>Running services</span>
          <strong id="runningServices">0</strong>
        </div>
      </section>

      <section>
        <h2>Services</h2>
        <div id="services" class="service-grid"></div>
      </section>

      <section>
        <h2>Recent Events</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Service</th>
                <th>Type</th>
                <th>Source</th>
                <th>Summary</th>
              </tr>
            </thead>
            <tbody id="events"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
