<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Honeypot Director</title>
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem("honeypot-director-theme") === "dark" ? "dark" : "light";
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    </script>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="app-page">
    <div id="app-root"></div>
    <script src="/static/vendor/react.production.min.js"></script>
    <script src="/static/vendor/react-dom.production.min.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/app-react.js"></script>
  </body>
</html>
