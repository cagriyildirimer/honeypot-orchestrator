version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: honeypot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot_password
      POSTGRES_DB: honeypot
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  honeypot-web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeypot-web
    depends_on:
      - postgres
    privileged: true
    cap_add:
      - NET_ADMIN
    ports:
      # Web API Port (internally mapping web port to 8000)
      - "8082:8000"
      # Windows/Linux TCP Decoy Ports
      - "8080:8080" # HTTP Linux
      - "80:80"     # HTTP Windows
      - "2222:2222" # SSH Linux
      - "2223:2223" # SSH Windows
      - "2121:2121" # FTP Linux
      - "2323:2323" # Telnet Linux
      - "1053:1053/udp" # DNS Windows
      - "139:139"   # NetBIOS Windows
      - "389:389"   # LDAP Windows
      - "636:636"   # LDAPS Windows
      - "1433:1433" # MSSQL Windows
      - "3389:3389" # RDP Windows
      - "1445:1445" # SMB Windows
      - "135:135"   # RPC Windows
      # Windows UDP Decoy Ports
      - "5355:5355/udp" # LLMNR Windows
      - "137:137/udp"  # NBTNNS Windows
    environment:
      HONEYPOT_HOST: "0.0.0.0"
      HONEYPOT_PROFILE: "windows_server"
      HONEYPOT_WEB_ENABLED: "true"
      HONEYPOT_WEB_HOST: "0.0.0.0"
      HONEYPOT_WEB_PORT: "8000"
      HONEYPOT_LOG_PATH: "/app/logs/events.jsonl"
      HONEYPOT_DB_URL: "postgresql://honeypot:honeypot_password@postgres:5432/honeypot"
      HONEYPOT_AUTH_USERNAME: "${HONEYPOT_AUTH_USERNAME:-admin}"
      HONEYPOT_AUTH_PASSWORD: "${HONEYPOT_AUTH_PASSWORD:-admin123}"
    volumes:
      - honeypot_logs:/app/logs
      # Bind mount config.yaml from project root
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: honeypot-frontend
    ports:
      - "8000:80"
    depends_on:
      - honeypot-web
    restart: unless-stopped

volumes:
  pgdata:
  honeypot_logs:
