services:
  backend:
    build: ./backend
    container_name: honeypot-backend
    cap_add:
      - NET_ADMIN
    privileged: true
    ports:
      - "8080:8080"
      - "${HONEYPOT_HTTP_WINDOWS_PORT:-80}:80"
      - "${HONEYPOT_SSH_WINDOWS_PORT:-2223}:2223"
      - "2222:2222"
      - "2121:2121"
      - "2323:2323"
      - "1053:1053"
      - "139:139"
      - "389:389"
      - "636:636"
      - "1433:1433"
      - "3389:3389"
      - "1445:1445"
      - "135:135"
      - "5355:5355/udp"
      - "137:137/udp"
    environment:
      HONEYPOT_HOST: "0.0.0.0"
      HONEYPOT_PROFILE: "empty"
      HONEYPOT_WEB_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_HTTP_LINUX_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_HTTP_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_SSH_LINUX_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_SSH_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_FTP_LINUX_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_TELNET_LINUX_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_DNS_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_NETBIOS_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_LDAP_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_LDAPS_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_MSSQL_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_RDP_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_SMB_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_LLMNR_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_NBTNNS_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_SERVICE_RPC_WINDOWS_HOST: "0.0.0.0"
      HONEYPOT_AUTH_USERNAME: "${HONEYPOT_AUTH_USERNAME:-admin}"
      HONEYPOT_AUTH_PASSWORD: "${HONEYPOT_AUTH_PASSWORD:-admin123}"
      HONEYPOT_TI_ABUSEIPDB_KEY: "${HONEYPOT_TI_ABUSEIPDB_KEY:-}"
      HONEYPOT_TI_GREYNOISE_KEY: "${HONEYPOT_TI_GREYNOISE_KEY:-}"
      HONEYPOT_LOG_PATH: "/app/logs/events.jsonl"
    volumes:
      - honeypot_logs:/app/logs
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: honeypot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  honeypot_logs:
